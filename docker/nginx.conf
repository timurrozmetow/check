# DirectorHub — t12.site
# HTTP: ACME-челлендж + редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name t12.site www.t12.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: статика клиента + прокси на API
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name t12.site www.t12.site;

    ssl_certificate     /etc/letsencrypt/live/t12.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t12.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Базовые заголовки безопасности
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Загрузки до 20 МБ (+ запас на multipart)
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # API — проксируем на Node (в т.ч. cookie-авторизацию /uploads и SSE)
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (/api/v1/notifications/stream): без буферизации, долгий таймаут
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Вложения — тоже через Node (там cookie-гард up_token), не напрямую с диска
    location /uploads/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-роутинг: всё остальное — на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
