# ============================================================
# DirectorHub — полный конфиг Nginx для t12.site  (VPS 144.31.98.4)
# Файл на сервере: /etc/nginx/sites-available/directorhub
#   sudo ln -sf /etc/nginx/sites-available/directorhub /etc/nginx/sites-enabled/directorhub
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS-сертификат нужен ДО включения этого конфига (см. DEPLOY.md, шаг «Bootstrap TLS»):
#   sudo mkdir -p /var/www/certbot
#   sudo systemctl stop nginx
#   sudo certbot certonly --standalone -d t12.site -d www.t12.site -m ВАШ_EMAIL --agree-tos --no-eff-email
#   sudo systemctl start nginx
# Продление без простоя (webroot + reload) — команды в DEPLOY.md.
#
# nginx < 1.25.1: строка "listen 443 ssl http2;" — как ниже.
# nginx >= 1.25.1: замените на "listen 443 ssl;" + отдельная директива "http2 on;".
# ============================================================

# ---------- HTTP :80 — ACME-челлендж + редирект на HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name t12.site www.t12.site;

    # Проверка Let's Encrypt (webroot-продление)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS :443 — основной сайт ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name t12.site www.t12.site;

    # --- Сертификаты Let's Encrypt ---
    ssl_certificate     /etc/letsencrypt/live/t12.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t12.site/privkey.pem;

    # --- Параметры TLS (современные, Mozilla intermediate) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # --- Заголовки безопасности (действуют на все ответы) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Собранный фронтенд (vite build → client/dist) ---
    root /var/www/directorhub/client/dist;
    index index.html;

    client_max_body_size 25m;      # с запасом над лимитом файла 20 МБ

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # --- API → Fastify (PM2) на 127.0.0.1:4000 ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/api/v1/notifications/stream): без буферизации, длинный таймаут
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # --- Загруженные файлы: ТОЛЬКО через API (cookie-авторизация up_token). ---
    # НЕ раздавать alias'ом с диска — иначе файлы станут публичными в обход авторизации.
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- Хэшированная статика Vite — кэш надолго (expires не глушит security-заголовки) ---
    location /assets/ {
        expires 30d;
        try_files $uri =404;
    }

    # --- SPA: всё остальное → index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кэшируем, чтобы обновления фронта подхватывались сразу
    location = /index.html {
        expires -1;
    }
}

# ---------- Хардненинг: прямой доступ по IP или чужому Host — закрываем ----------
# Ответ 444 (nginx рвёт соединение). Убирает шум ботов, бьющих по 144.31.98.4.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Для завершения TLS-хендшейка нужен любой валидный серт — берём тот же.
    ssl_certificate     /etc/letsencrypt/live/t12.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t12.site/privkey.pem;

    return 444;
}
